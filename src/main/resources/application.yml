# ========================
# TaskMaster - Application Configuration
# ========================

spring:
  application:
    name: taskmaster

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmaster}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ========================
# JWT Configuration
# ========================
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
    issuer: taskmaster-api

  # File Upload Configuration
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-extensions: pdf,doc,docx,xls,xlsx,png,jpg,jpeg,gif,txt,zip

  # CORS Configuration
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    max-age: 3600

# ========================
# Server Configuration
# ========================
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ========================
# Actuator Configuration
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ========================
# Logging Configuration
# ========================
logging:
  level:
    com.taskmaster: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_FILE:logs/taskmaster.log}

# ========================
# Springdoc / Swagger Configuration
# ========================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
