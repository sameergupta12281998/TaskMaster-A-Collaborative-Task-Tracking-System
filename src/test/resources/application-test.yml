# ========================
# Test Configuration
# ========================
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    issuer: taskmaster-api-test

  upload:
    dir: ./test-uploads
    allowed-extensions: pdf,doc,docx,png,jpg,jpeg,txt

  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    max-age: 3600

logging:
  level:
    com.taskmaster: DEBUG
